name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Patch ajv-keywords _formatLimit (ajv@8 compat)
        run: |
          find node_modules -name "_formatLimit.js" -path "*/ajv-keywords/*" | \
            xargs sed -i 's/var formats = ajv\._formats;/var formats = ajv._formats || {};/g'

      - name: Build
        run: npm run build
        env:
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_GOOGLE_API_KEY: ${{ secrets.REACT_APP_GOOGLE_API_KEY }}
          REACT_APP_PIN: ${{ secrets.REACT_APP_PIN }}
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
          DISABLE_ESLINT_PLUGIN: true
          SKIP_PREFLIGHT_CHECK: true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 7
          if-no-files-found: error
