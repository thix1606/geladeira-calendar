name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          # Patch: substitui ForkTsChecker por stubs para evitar conflito de ajv
          printf 'module.exports = function() {};\n' > node_modules/react-dev-utils/ForkTsCheckerWebpackPlugin.js
          printf 'module.exports = function() {};\n' > node_modules/react-dev-utils/ForkTsCheckerWarningWebpackPlugin.js
          # Patch ajv-keywords dentro do fork-ts-checker
          FMTLIMIT=$(find node_modules/fork-ts-checker-webpack-plugin -name '_formatLimit.js' 2>/dev/null | head -1)
          if [ -n "$FMTLIMIT" ]; then printf 'module.exports = {};\n' > "$FMTLIMIT"; fi

      - name: Build
        run: npm run build
        env:
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_GOOGLE_API_KEY: ${{ secrets.REACT_APP_GOOGLE_API_KEY }}
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
          DISABLE_ESLINT_PLUGIN: true
          TSC_COMPILE_ON_ERROR: true
          SKIP_PREFLIGHT_CHECK: true

      - name: List build output
        run: ls -la && ls -la build/ || echo 'No build dir'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 7
          if-no-files-found: error
