name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          # Patch: neutraliza ForkTsChecker em todos os lugares
          find node_modules -name 'ForkTsCheckerWebpackPlugin.js' -not -path '*/fork-ts-checker-webpack-plugin/out/*' | xargs -I{} sh -c 'echo "module.exports = function() {};" > {}'
          find node_modules -name 'ForkTsCheckerWarningWebpackPlugin.js' | xargs -I{} sh -c 'echo "module.exports = function() {};" > {}'
          # Fix ajv conflict no fork-ts-checker
          find node_modules/fork-ts-checker-webpack-plugin -name 'ajv' -type d | head -5
          find node_modules -path '*/fork-ts-checker-webpack-plugin/node_modules/ajv-keywords/keywords/_formatLimit.js' | xargs -I{} sh -c 'echo "module.exports = {};" > {}'

      - name: Build
        run: npm run build
        env:
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_GOOGLE_API_KEY: ${{ secrets.REACT_APP_GOOGLE_API_KEY }}
          CI: false
          NODE_OPTIONS: --openssl-legacy-provider
          DISABLE_ESLINT_PLUGIN: true
          TSC_COMPILE_ON_ERROR: true
          SKIP_PREFLIGHT_CHECK: true

      - name: List build output
        run: ls -la && ls -la build/ || echo 'No build dir'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/
          retention-days: 7
          if-no-files-found: error
